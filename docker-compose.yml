services:
  courier:
    build: .
    ports:
      - "4000:4000"
    volumes:
      # Persist the SQLite database
      - courier_data:/data
      # Optional: mount your Calibre library to archive delivered epubs.
      # Set this to the same path your Calibre or CalibreWeb container uses.
      # - /path/to/calibre/library:/library
    environment:
      # Required
      DATABASE_PATH: /data/courier.db
      SECRET_KEY_BASE: "changeme_run_mix_phx_gen_secret"

      # Phoenix host/port (adjust if behind a reverse proxy)
      PHX_HOST: localhost
      PORT: "4000"
      # PHX_SCHEME: https

      # Calibre delivery settings
      COURIER_SMTP_FROM: you@gmail.com
      COURIER_SMTP_USERNAME: you@gmail.com
      COURIER_SMTP_PASSWORD: your_app_password
      COURIER_SMTP_RELAY: smtp.gmail.com
      COURIER_SMTP_PORT: "587"
      COURIER_SMTP_ENCRYPTION: TLS

      # Optional: archive delivered epubs into a Calibre library.
      # Uncomment the volume mount above and set this to the mount path.
      # Works with Calibre and CalibreWeb — point both at the same library directory.
      # COURIER_CALIBRE_LIBRARY: /library

volumes:
  courier_data:
